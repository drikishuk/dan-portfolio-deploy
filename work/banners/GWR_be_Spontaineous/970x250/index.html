<!DOCTYPE html>
<html lang="en">
  <head>
    <title></title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="ad.size" content="width=970,height=250" />
    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"
    ></script>
    <script type="text/javascript" src="main.js"></script>

    <script type="text/javascript">
      var clickTag = "https://www.gwr.com/";
    </script>
  </head>

  <body onload="init();">
    <div id="main_container">
      <div id="main_content" class="hidden">

          <div id="background-container" class="absolute">
            <img src="images/bg-2.jpg" id="bg-2" class="absolute full-width">
            <img src="images/bg-1.jpg" id="bg-1" class="absolute full-width">
          </div>

          <div id="text-container" class="absolute">
            <img src="images/text-1a.png" id="text-1a" class="text-1 absolute full-width hidden">
            <img src="images/text-1b.png" id="text-1b" class="text-1 absolute full-width hidden">

            <img src="images/text-2a.png" id="text-2a" class="text-2 absolute full-width hidden">
            <img src="images/text-2b.png" id="text-2b" class="text-2 absolute full-width hidden">

            <img src="images/text-3a.png" id="text-3a" class="text-3 absolute full-width hidden">
            <img src="images/text-3b.png" id="text-3b" class="text-3 absolute full-width hidden">

            <img src="images/text-4a.png" id="text-4a" class="text-4 absolute full-width hidden">
            <img src="images/text-4b.png" id="text-4b" class="text-4 absolute full-width hidden">
            <img src="images/text-4c.png" id="text-4c" class="text-4 absolute full-width hidden">
            <img src="images/text-4d.png" id="text-4d" class="text-4 absolute full-width hidden">
          </div>

          <div id="roundel-container" class="absolute">
            <div id="roundel-1-container" class="absolute">
              <div id="roundel-1" class="roundel absolute hidden"></div>
              <img src="images/roundel-1a.png" id="roundel-1a" class="absolute full-width hidden">
              <img src="images/roundel-1b.png" id="roundel-1b" class="roundel-price absolute full-width hidden">
            </div>

            <div id="roundel-2-container" class="absolute">
              <div id="roundel-2" class="roundel absolute hidden"></div>
              <img src="images/roundel-1a.png" id="roundel-2a" class="absolute full-width hidden">
              <img src="images/roundel-1b.png" id="roundel-2b" class="roundel-price absolute full-width hidden">
            </div>
            
            <div id="roundel-3-container" class="absolute">
              <div id="roundel-3" class="roundel absolute hidden"></div>
              <img src="images/roundel-3a.png" id="roundel-3a" class="absolute full-width hidden">
              <img src="images/roundel-3b.png" id="roundel-3b" class="roundel-price absolute full-width hidden">
            </div>
          </div>

          <div id="logo-panel" class="absolute"></div>
            <img src="images/tagline.png" id="tagline" class="absolute full-width">
            <img src="images/legal.png" id="legal" class="absolute full-width">

          <img src="images/cta.png" id="cta" class="absolute">
          <!-- <img src="images/logo.png" id="logo-ref" class="absolute full-width"> -->
          <img src="images/logo.svg" id="logo" class="absolute">
      </div>

      <div id="default_exit" class="btn"></div>
    </div>
    <!-- end main_container -->
  </body>
</html>
