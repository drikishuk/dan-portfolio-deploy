<!DOCTYPE html>

<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <meta name="ad.size" content="width=300,height=250" />

    <link rel="stylesheet" type="text/css" href="styles.css" />

    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"
    ></script>

    <script type="text/javascript" src="main.js"></script>

    <script language="javascript">
      var clickTag = "https://www.google.co.uk/";
    </script>

    <title></title>
  </head>

  <body onload="init();">
    <div id="main_container">
      <!--start main_container-->

      <div id="main_content" class="hidden">
        <!--start main_content-->

        <div id="bg_holder"></div>

        <div id="text_holder">
          <img id="txt1" src="images/Di997-300x250-txt1.png" class="retina" />
          <img id="txt2" src="images/Di997-300x250-txt2.png" class="retina" />
          <img id="txt3" src="images/Di997-300x250-txt3.png" class="retina" />
          <img id="txt4" src="images/Di997-300x250-txt4.png" class="retina" />
          <!-- <img id="txt5" src="images/Di997-300x250-txt5.png" class="retina" /> -->
          <img id="txt6" src="images/Di997-300x250-txt6.png" class="retina" />
          <img
            id="baseline"
            src="images/Di997-300x250-base.png"
            class="retina"
          />
        </div>

        <div id="image_holder">
          <img id="img1" src="images/Di997-300x250-car1.jpg" class="retina" />
          <img id="img2" src="images/Di997-300x250-car2.jpg" class="retina" />
          <img id="img3" src="images/Di997-300x250-car3.jpg" class="retina" />
          <img id="img4" src="images/Di997-300x250-car4.jpg" class="retina" />
        </div>

        <img id="logo" src="images/Di997-300x250-logo.png" class="retina" />

        <img id="cta" src="images/Di997-300x250-cta.png" class="retina" />

        <!--end main_content-->
      </div>

      <div id="default_exit" class="btn"></div>

      <!--end main_container-->
    </div>
    <script>
      var clickArea = document.getElementById("default_exit");
      clickArea.onclick = function () {
        window.open(clickTag);
      };
    </script>
  </body>
</html>
