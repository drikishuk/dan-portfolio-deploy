<!DOCTYPE html>
<html lang="en">

    <meta name="ad.size" content="width=120,height=600">

    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
    <script type="text/javascript">
      var clickTag = "https://www.lloydsbank.com/";

</head>
<body onload="window.init()">
    
    <div id="main">
        <img class="cover_image" src="images/cover.jpg" alt="">

        <!-- <img src="images/logo.png" class="" id="logo" alt="" style="position: absolute; z-index: 1; width: 120px; top: 0;"> -->
         
        <div>

            Right now, <br />
            good things are <br />
            happening at <br />
            Breck Homes
          </div>

          <div id="text2" class="absolute copy hidden">
            Join the <br />

              1 million <br />
              businesses 
            </span>
            <br />
            that bank <br />
            with us, today
          </div>
        </div>
